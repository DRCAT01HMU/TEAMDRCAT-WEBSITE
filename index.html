<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Hệ Thống Trắc Nghiệm Y Khoa Toàn Diện - TEAMDRCAT</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/force-graph"></script>
    
    <style>
        body { 
            margin: 0;
            padding: 0;
            background-color: #111111;
            color: #f8fafc;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        #graph-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
            cursor: grab;
        }
        #graph-container:active {
            cursor: grabbing;
        }

        .overlay-ui {
            position: absolute;
            z-index: 10;
            pointer-events: none;
        }

        .interactive {
            pointer-events: auto;
        }

        .glass-panel {
            background: rgba(17, 17, 17, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        
        /* Custom scrollbar for small devices if needed */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="selection:bg-blue-500/30">

    <div id="graph-container"></div>

    <!-- Header Overlay -->
    <header class="overlay-ui top-0 left-0 w-full p-4 md:p-6 flex justify-between items-start pointer-events-none">
        <div class="interactive flex items-center gap-3 md:gap-4 cursor-pointer group" onclick="resetView()">
            <div class="w-10 h-10 md:w-12 md:h-12 bg-slate-800 border border-slate-600 rounded-lg md:rounded-xl flex items-center justify-center shadow-lg group-hover:scale-105 transition-transform group-hover:bg-slate-700">
                <i class="fas fa-network-wired text-slate-300 text-lg md:text-xl"></i>
            </div>
            <div>
                <h1 class="text-lg md:text-2xl font-bold tracking-tight text-slate-200 font-['Outfit'] leading-none">TEAMDRCAT</h1>
                <p class="text-[9px] md:text-[10px] text-slate-400 tracking-wider font-semibold uppercase mt-0.5 md:mt-1">Knowledge Graph</p>
            </div>
        </div>

        <div class="interactive flex gap-4">
            <div class="glass-panel rounded-xl px-3 py-2 md:px-4 md:py-2.5 flex items-center gap-2 md:gap-3 transition-colors focus-within:border-slate-400 focus-within:bg-slate-900">
                <i class="fas fa-search text-slate-500 text-sm"></i>
                <input type="text" id="searchInput" placeholder="Tìm môn học..." class="bg-transparent border-none outline-none text-slate-200 w-28 sm:w-40 md:w-56 placeholder-slate-600 text-xs md:text-sm font-medium">
            </div>
        </div>
    </header>

    <!-- Info Panel Overlay (Responsive: Bottom sheet on mobile, right panel on desktop) -->
    <div id="infoPanel" class="overlay-ui interactive fixed bottom-4 left-4 right-4 md:bottom-auto md:left-auto md:right-6 md:top-1/2 md:transform md:-translate-y-1/2 md:w-80 glass-panel rounded-2xl p-5 md:p-6 opacity-0 transition-all duration-300 scale-95 pointer-events-none z-20 shadow-2xl">
        <div class="relative z-10">
            <div class="w-10 h-10 rounded-lg bg-slate-800 text-slate-300 flex items-center justify-center text-xl mb-3 md:mb-4 border border-slate-700">
                <i id="panelIcon" class="fas fa-book-medical"></i>
            </div>
            <p id="panelSubject" class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1 md:mb-1.5">CHUYÊN NGÀNH</p>
            <h3 id="panelTitle" class="text-lg md:text-xl font-bold text-white mb-2 md:mb-3 leading-tight font-['Outfit']">Tiêu đề bài học</h3>
            <p class="text-slate-500 text-xs mb-4 md:mb-5 leading-relaxed">Mở giao diện học tập lâm sàng cho chuyên đề này.</p>
            
            <button id="panelBtn" class="w-full py-3 bg-slate-200 hover:bg-white text-slate-900 rounded-lg font-bold text-sm transition-all flex justify-center items-center gap-2 group active:scale-95">
                Mở Bài Học <i class="fas fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
            </button>
        </div>
    </div>

    <!-- Data & Script -->
    <script src="graph_data.js"></script>
    <script>
        const highlightNodes = new Set();
        const highlightLinks = new Set();
        let hoverNode = null;

        const Graph = ForceGraph()
            (document.getElementById('graph-container'))
            .graphData(graphData)
            .nodeId('id')
            .nodeVal('size')
            .nodeLabel(() => '') 
            .linkColor(link => {
                if(highlightLinks.size > 0) {
                    return highlightLinks.has(link) ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.02)';
                }
                return 'rgba(255,255,255,0.1)';
            })
            .linkWidth(link => (highlightLinks.has(link) ? 1.5 : 0.5))
            .linkDirectionalArrowLength(link => highlightLinks.has(link) ? 5 : 3.5)
            .linkDirectionalArrowRelPos(1)
            .nodeCanvasObject((node, ctx, globalScale) => {
                const isMobile = window.innerWidth < 768;
                const scaleFactor = node.group === 0 ? (isMobile ? 1.2 : 1.5) : (node.group === 1 ? (isMobile ? 1 : 1.2) : 0.8);
                const size = Math.sqrt(node.size) * scaleFactor; 
                
                ctx.beginPath();
                ctx.arc(node.x, node.y, size, 0, 2 * Math.PI, false);
                
                if (hoverNode === node) {
                    ctx.fillStyle = '#93c5fd'; 
                    ctx.shadowColor = '#60a5fa';
                    ctx.shadowBlur = 10;
                } else if (highlightNodes.has(node)) {
                    ctx.fillStyle = '#e2e8f0'; 
                    ctx.shadowBlur = 0;
                } else if (highlightNodes.size > 0) {
                    ctx.fillStyle = 'rgba(255,255,255,0.05)'; 
                    ctx.shadowBlur = 0;
                } else {
                    ctx.fillStyle = '#9ca3af'; 
                    ctx.shadowBlur = 0;
                }
                ctx.fill();

                if (highlightNodes.size > 0 && !highlightNodes.has(node)) return; 
                if (node.group === 2 && !highlightNodes.has(node) && hoverNode !== node) return;
                
                let baseFontSize = node.group === 0 ? 14 : (node.group === 1 ? 12 : 9);
                if (isMobile) baseFontSize *= 0.85;
                const fontSize = baseFontSize / globalScale;
                
                ctx.font = `${node.group === 0 ? 'bold ' : ''}${fontSize}px "Plus Jakarta Sans", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                const labelY = node.y + size + fontSize;

                if (hoverNode === node) {
                    const textWidth = ctx.measureText(node.name).width;
                    const bWidth = textWidth + 8/globalScale;
                    const bHeight = fontSize + 4/globalScale;
                    
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                    ctx.fillRect(node.x - bWidth/2, labelY - bHeight/2, bWidth, bHeight);
                    ctx.fillStyle = '#000000'; 
                } else if (highlightNodes.has(node)) {
                    ctx.fillStyle = '#ffffff';
                } else {
                    ctx.fillStyle = node.group === 0 ? '#f8fafc' : '#cbd5e1';
                }
                
                ctx.fillText(node.name, node.x, labelY);
            })
            .onNodeHover(node => {
                if ((!node && !highlightNodes.size) || (node && hoverNode === node)) return;

                highlightNodes.clear();
                highlightLinks.clear();
                
                if (node) {
                    highlightNodes.add(node);
                    graphData.links.forEach(link => {
                        if (link.source === node || link.source.id === node.id) {
                            highlightNodes.add(link.target);
                            highlightLinks.add(link);
                        }
                        if (link.target === node || link.target.id === node.id) {
                            highlightNodes.add(link.source);
                            highlightLinks.add(link);
                        }
                    });
                }

                hoverNode = node || null;
                document.getElementById('graph-container').style.cursor = node ? 'pointer' : 'grab';
                
                Graph.nodeColor(Graph.nodeColor())
                     .linkColor(Graph.linkColor())
                     .linkWidth(Graph.linkWidth());
            })
            .onNodeClick(node => {
                const isMobile = window.innerWidth < 768;
                Graph.centerAt(node.x, node.y, 1000);
                Graph.zoom(node.group === 0 ? (isMobile ? 1 : 1.5) : (isMobile ? 1.5 : 2.5), 1000);

                if(node.group === 1 && node.url) {
                    showPanel(node);
                } else {
                    hidePanel();
                }
            });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            if(!val) {
                resetView();
                return;
            }
            const targetNode = graphData.nodes.find(n => n.name.toLowerCase().includes(val));
            if(targetNode) {
                const isMobile = window.innerWidth < 768;
                Graph.centerAt(targetNode.x, targetNode.y, 1000);
                Graph.zoom(isMobile ? 1.5 : 2.5, 1000);
                if(targetNode.group === 1) showPanel(targetNode);
                
                highlightNodes.clear();
                highlightLinks.clear();
                highlightNodes.add(targetNode);
                Graph.nodeColor(Graph.nodeColor()).linkColor(Graph.linkColor());
            }
        });

        const panel = document.getElementById('infoPanel');
        const pTitle = document.getElementById('panelTitle');
        const pSubj = document.getElementById('panelSubject');
        const pBtn = document.getElementById('panelBtn');
        const pIcon = document.getElementById('panelIcon');
        
        let currentUrl = "";

        function showPanel(node) {
            pTitle.innerText = node.name;
            currentUrl = node.url;
            
            if(node.name === 'Nội Khoa') { pIcon.className = "fas fa-stethoscope"; }
            else if(node.name === 'Ngoại Khoa') { pIcon.className = "fas fa-kit-medical"; }
            else if(node.name === 'Sản Khoa') { pIcon.className = "fas fa-person-pregnant"; }
            else if(node.name === 'Nhi Khoa') { pIcon.className = "fas fa-baby"; }
            else if(node.name === 'Giải Phẫu') { pIcon.className = "fas fa-bone"; }
            else if(node.name === 'Sinh Lý') { pIcon.className = "fas fa-heart-pulse"; }
            else { pIcon.className = "fas fa-book-medical"; }

            panel.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
        }

        function hidePanel() {
            panel.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
            if(document.getElementById('searchInput').value === '') {
                highlightNodes.clear();
                highlightLinks.clear();
                Graph.nodeColor(Graph.nodeColor()).linkColor(Graph.linkColor());
            }
        }

        pBtn.addEventListener('click', () => {
            if(currentUrl) window.open(currentUrl, '_blank');
        });

        function resetView() {
            Graph.zoomToFit(1000, window.innerWidth < 768 ? 50 : 100);
            hidePanel();
            document.getElementById('searchInput').value = '';
            highlightNodes.clear();
            highlightLinks.clear();
            Graph.nodeColor(Graph.nodeColor()).linkColor(Graph.linkColor());
        }

        Graph.d3Force('charge').strength(window.innerWidth < 768 ? -250 : -400); 
        Graph.d3Force('link').distance(link => {
            const baseDist = window.innerWidth < 768 ? 120 : 180;
            if (link.source.group === 0) return baseDist;
            return baseDist / 3;
        });

        setTimeout(() => {
            Graph.zoomToFit(1000, window.innerWidth < 768 ? 40 : 80);
        }, 800);

        window.addEventListener('resize', () => {
            Graph.width(window.innerWidth).height(window.innerHeight);
            // Re-adjust physics on resize if crossing breakpoint
            Graph.d3Force('charge').strength(window.innerWidth < 768 ? -250 : -400); 
            Graph.d3Force('link').distance(link => {
                const baseDist = window.innerWidth < 768 ? 120 : 180;
                if (link.source.group === 0) return baseDist;
                return baseDist / 3;
            });
        });
    </script>
</body>
</html>
